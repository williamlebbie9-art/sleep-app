name: sleeploock
description: "A sleep focus app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
   
  cupertino_icons: ^1.0.8
  audioplayers: ^6.5.1
  shared_preferences: ^2.2.2
  purchases_flutter: ^9.10.8
  image_picker: ^1.2.1
  path_provider: ^2.1.5
  http: ^1.2.1
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.4
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.3
  cloud_firestore: ^5.5.2
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  url_launcher: ^6.3.1
  app_links: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/moon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/sounds/
    - assets/audio/stories/
    - assets/alarm
